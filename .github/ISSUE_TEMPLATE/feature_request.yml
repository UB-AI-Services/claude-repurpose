name: Feature Request
description: Suggest a new platform or feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New platform support
        - Existing platform improvement
        - New output format
        - Voice/tone feature
        - Image generation
        - Calendar/scheduling
        - Other
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: How would you use this feature?
